server:
  port: 8080
  read_timeout: 10s
  write_timeout: 10s

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0

gateway:
  routes:
    - path: "/api/v1/service-a"
      targets: ["http://localhost:8081", "http://localhost:8083"]
      methods: ["GET", "POST"]
      middleware:
        - auth
        - ratelimit
    - path: "/api/v1/service-b"
      targets: ["http://localhost:8082"]
      methods: ["GET"]
      middleware:
        - ratelimit

auth:
  jwt_secret: "your-super-secret-key"

ratelimit:
  requests_per_second: 10
  burst: 20
